<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLK — Word Grid Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #1a1a2e;
      --paper: #f5f0e8;
      --paper-dark: #ede7d9;
      --p1: #c0392b;
      --p2: #1a5276;
      --accent: #d4a017;
      --grid-bg: #2c2c3e;
      --cell-empty: #f5f0e8;
      --cell-hover: #fdf6e3;
      --cell-selected: #f9e79f;
      --cell-selected-border: #d4a017;
      --shadow: 0 4px 24px rgba(26,26,46,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          rgba(26,26,46,0.04) 27px,
          rgba(26,26,46,0.04) 28px
        );
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    header h1 {
      font-family: 'IBM Plex Mono', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }

    header h1 span { color: var(--p1); }

    .room-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-top: 4px;
    }

    #status {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      padding: 8px 20px;
      border-radius: 4px;
      background: var(--paper-dark);
      border-left: 4px solid var(--accent);
      width: 100%;
      max-width: 700px;
      transition: border-color 0.3s;
    }

    #status.your-turn  { border-color: var(--p1); color: var(--p1); }
    #status.waiting    { border-color: var(--p2); color: var(--p2); }
    #status.connecting { border-color: #aaa; color: #888; }

    .main-container {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 820px;
    }

    /* ── GRID ── */
    .grid-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 6px;
      background: var(--grid-bg);
      padding: 10px;
      border-radius: 10px;
      box-shadow: var(--shadow);
      transition: opacity 0.3s;
    }

    .grid.locked { opacity: 0.45; pointer-events: none; }

    .cell {
      width: clamp(52px, 11vw, 64px);
      height: clamp(52px, 11vw, 64px);
      background: var(--cell-empty);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', serif;
      font-size: clamp(20px, 4.5vw, 28px);
      font-weight: 700;
      cursor: pointer;
      border-radius: 5px;
      border: 2px solid transparent;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none;
    }

    .cell:hover:not(.occupied) { background: var(--cell-hover); transform: scale(1.06); }
    .cell.selected { background: var(--cell-selected) !important; border-color: var(--cell-selected-border) !important; transform: scale(1.08); }
    .cell.occupied { cursor: default; }
    .cell.p1-cell { color: var(--p1); }
    .cell.p2-cell { color: var(--p2); }

    .coord-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 0 10px;
      width: calc(5 * clamp(52px, 11vw, 64px) + 4 * 6px + 20px);
    }

    .coord {
      text-align: center;
      font-size: 10px;
      color: #aaa;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* ── SIDE PANEL ── */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: clamp(260px, 38vw, 320px);
    }

    .panel-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 2px;
    }

    textarea#gameNotes {
      width: 100%;
      height: 200px;
      background: #fffef5;
      padding: 12px;
      border-radius: 6px;
      border: 1.5px solid #ddd;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      resize: none;
      color: var(--ink);
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    textarea#gameNotes:focus { outline: none; border-color: var(--accent); }

    input[type="text"]#wordInput {
      width: 100%;
      padding: 12px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border-radius: 6px;
      border: 1.5px solid #ccc;
      background: white;
      color: var(--ink);
      transition: border-color 0.2s;
    }

    input[type="text"]#wordInput:focus { outline: none; border-color: var(--accent); }

    .cell-count {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      height: 16px;
      margin-top: 4px;
    }

    .cell-count.match    { color: #27ae60; font-weight: 600; }
    .cell-count.mismatch { color: var(--p1); font-weight: 600; }

    button#submitBtn {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }

    button#submitBtn:hover:not(:disabled) { background: var(--p2); transform: translateY(-1px); }
    button#submitBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-reset {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: #bbb;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-reset:hover { color: var(--p1); border-color: var(--p1); }

    .legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .legend span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.p1 { background: var(--p1); }
    .dot.p2 { background: var(--p2); }

    .rules-hint {
      font-size: 10px;
      color: #aaa;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 680px) {
      .main-container { flex-direction: column; align-items: center; }
      .side-panel { width: 100%; max-width: calc(5 * clamp(52px,11vw,64px) + 4*6px + 20px); }
    }
  </style>
</head>
<body>

<header>
  <h1>SL<span>K</span></h1>
  <div class="room-tag" id="roomTag">connecting…</div>
</header>

<div id="status" class="connecting">Connecting…</div>

<div class="main-container">

  <div class="grid-wrapper">
    <div class="coord-row" id="colCoords"></div>
    <div class="grid" id="gameGrid"></div>
    <div class="legend">
      <span><div class="dot p1"></div> Player 1</span>
      <span><div class="dot p2"></div> Player 2</span>
    </div>
  </div>

  <div class="side-panel">
    <div>
      <div class="panel-label">Notes &amp; Scores</div>
      <textarea id="gameNotes" placeholder="Track scores, words played…"></textarea>
    </div>

    <div>
      <div class="panel-label">Letters to place</div>
      <input type="text" id="wordInput" placeholder="TYPE LETTERS" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="cell-count" id="cellCount">select cells on the grid</div>
    </div>

    <button id="submitBtn" onclick="submitMove()" disabled>Submit Move</button>
    <button class="btn-reset" onclick="resetGame()">↺ Reset Game</button>

    <div class="rules-hint">
      First move: place a word across all 5 cells (H or V).<br>
      Next moves: select 1–2 empty cells, type letters<br>
      to form a word readable in any non-diagonal direction.
    </div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════════
  //  CONFIGURATION — fill these in after creating your Supabase project
  //  See README.md for step-by-step setup instructions
  // ═══════════════════════════════════════════════════════════════
  const SUPABASE_URL  = 'https://xyllpshcfyymnetehlfn.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_pZWmpwxYhzZN6aFrh40uWA_Gf8VJY69';
  const TABLE_NAME    = 'slk_rooms';
  // ═══════════════════════════════════════════════════════════════

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // Room from URL ?room=Name, defaults to Lobby
  const params  = new URLSearchParams(window.location.search);
  const ROOM_ID = params.get('room') || 'Lobby';

  // ── STATE ────────────────────────────────────────────────────────
  let gameState       = { grid: Array(25).fill(''), turn: 1, notes: '' };
  let selectedIndices = [];
  let myPlayerNumber  = localStorage.getItem('player_num_' + ROOM_ID);
  let isLocked        = false;
  let connected       = false;

  // ── SUPABASE INIT ────────────────────────────────────────────────
  async function init() {
    document.getElementById('roomTag').textContent = 'Room: ' + ROOM_ID;

    // 1. Load existing state from DB
    const { data, error } = await db
      .from(TABLE_NAME)
      .select('state')
      .eq('room_id', ROOM_ID)
      .single();

    if (data && data.state) {
      gameState = data.state;
      // Restore lock if it's not our turn
      if (myPlayerNumber && parseInt(myPlayerNumber) !== gameState.turn) {
        isLocked = true;
      }
    } else {
      // Room doesn't exist yet — will be created on first move
      console.log('New room, starting fresh');
    }

    connected = true;
    render();

    // 2. Subscribe to real-time changes on this room row
    db.channel('room:' + ROOM_ID)
      .on(
        'postgres_changes',
        {
          event:  '*',
          schema: 'public',
          table:  TABLE_NAME,
          filter: 'room_id=eq.' + ROOM_ID
        },
        (payload) => {
          const incoming = payload.new && payload.new.state;
          if (!incoming) return;

          // Don't overwrite our own just-submitted state
          gameState = incoming;

          // Unlock when it becomes our turn
          if (myPlayerNumber && parseInt(myPlayerNumber) === gameState.turn) {
            isLocked = false;
          }

          // Sync notes if not actively editing
          const nBox = document.getElementById('gameNotes');
          if (document.activeElement !== nBox) {
            nBox.value = gameState.notes || '';
          }

          render();
        }
      )
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          console.log('Real-time subscribed for room:', ROOM_ID);
        }
      });
  }

  // ── SAVE STATE TO SUPABASE ───────────────────────────────────────
  async function saveState(state) {
    const { error } = await db
      .from(TABLE_NAME)
      .upsert(
        { room_id: ROOM_ID, state: state, updated_at: new Date().toISOString() },
        { onConflict: 'room_id' }
      );
    if (error) console.error('Save error:', error);
  }

  // ── RENDER ───────────────────────────────────────────────────────
  function render() {
    renderGrid();
    renderStatus();
    renderCellCount();
  }

  function renderGrid() {
    const gridEl = document.getElementById('gameGrid');
    gridEl.innerHTML = '';

    // Column coords
    const colCoords = document.getElementById('colCoords');
    colCoords.innerHTML = '';
    'ABCDE'.split('').forEach(c => {
      const d = document.createElement('div');
      d.className = 'coord';
      d.textContent = c;
      colCoords.appendChild(d);
    });

    const canAct = !isLocked && connected;
    gridEl.classList.toggle('locked', !canAct);

    for (let i = 0; i < 25; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const cellData = gameState.grid[i];

      if (cellData && cellData.char) {
        cell.textContent = cellData.char;
        cell.classList.add('occupied', cellData.p === 1 ? 'p1-cell' : 'p2-cell');
      } else {
        if (selectedIndices.includes(i)) cell.classList.add('selected');
        cell.onclick = () => toggleCell(i);
      }
      gridEl.appendChild(cell);
    }
  }

  function renderStatus() {
    if (!connected) { setStatus('connecting', 'Connecting…'); return; }
    if (!myPlayerNumber) {
      setStatus('waiting', 'Player ' + gameState.turn + ' to move — join as either player');
      return;
    }
    const isMyTurn = parseInt(myPlayerNumber) === gameState.turn;
    if (isMyTurn) {
      setStatus('your-turn', '▶  Your turn  (Player ' + myPlayerNumber + ')');
    } else {
      setStatus('waiting', '⌛  Waiting for Player ' + gameState.turn);
    }
  }

  function setStatus(cls, text) {
    const el = document.getElementById('status');
    el.className = cls;
    el.textContent = text;
  }

  function renderCellCount() {
    const word    = document.getElementById('wordInput').value.trim().toUpperCase();
    const countEl = document.getElementById('cellCount');
    const btn     = document.getElementById('submitBtn');
    const sel     = selectedIndices.length;
    const wlen    = word.length;

    if (sel === 0) {
      countEl.className = 'cell-count';
      countEl.textContent = 'select cells on the grid';
      btn.disabled = true;
      return;
    }

    const match = sel > 0 && sel === wlen;
    countEl.className   = 'cell-count ' + (match ? 'match' : 'mismatch');
    countEl.textContent = sel + ' cell' + (sel !== 1 ? 's' : '') +
                          ' selected  ·  ' + wlen + ' letter' + (wlen !== 1 ? 's' : '');

    const canSubmit = match && connected && !isLocked &&
      (!myPlayerNumber || parseInt(myPlayerNumber) === gameState.turn);
    btn.disabled = !canSubmit;
  }

  // ── INTERACTION ──────────────────────────────────────────────────
  function toggleCell(i) {
    if (isLocked || !connected) return;
    const idx = selectedIndices.indexOf(i);
    if (idx > -1) selectedIndices.splice(idx, 1);
    else selectedIndices.push(i);
    render();
  }

  document.getElementById('wordInput').addEventListener('input', renderCellCount);

  // Notes: save on blur to avoid hammering Supabase on every keystroke
  document.getElementById('gameNotes').addEventListener('blur', async () => {
    gameState.notes = document.getElementById('gameNotes').value;
    await saveState(gameState);
  });

  async function submitMove() {
    if (isLocked || !connected) return;

    const val = document.getElementById('wordInput').value.trim().toUpperCase();
    if (selectedIndices.length === 0 || val.length !== selectedIndices.length) {
      alert('Selected cells must match the number of letters typed.');
      return;
    }

    // Claim player number on first move if not yet assigned
    if (!myPlayerNumber) {
      myPlayerNumber = String(gameState.turn);
      localStorage.setItem('player_num_' + ROOM_ID, myPlayerNumber);
    }

    if (parseInt(myPlayerNumber) !== gameState.turn) {
      alert("It's not your turn.");
      return;
    }

    // Apply move locally
    selectedIndices.forEach((idx, i) => {
      if (val[i]) gameState.grid[idx] = { char: val[i], p: parseInt(myPlayerNumber) };
    });

    gameState.turn  = gameState.turn === 1 ? 2 : 1;
    gameState.notes = document.getElementById('gameNotes').value;

    // Lock immediately — unlocks when real-time update comes back with our turn
    isLocked = true;
    selectedIndices = [];
    document.getElementById('wordInput').value = '';

    render();

    // Persist to Supabase — real-time subscription will notify the other player
    await saveState(gameState);
  }

  async function resetGame() {
    if (!confirm('Reset the game? This clears the board for both players.')) return;
    localStorage.removeItem('player_num_' + ROOM_ID);
    myPlayerNumber = null;
    isLocked       = false;
    selectedIndices = [];
    gameState = { grid: Array(25).fill(''), turn: 1, notes: '' };
    render();
    await saveState(gameState);
  }

  // ── START ────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
